name: build

on:
  push:
    branches:
      - "main"
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
      - uses: actions/setup-go@78961f6f84d799cd858575bb931c3e51d3b13290
        with:
          go-version: "1.25"
      - name: Cache apt packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: /var/cache/apt/archives
          key: apt-fyne-deps-v1
      - name: Install system dependencies (Fyne/OpenGL)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libgl1-mesa-dev xorg-dev
      - name: build-wasm
        run: |
          ./scripts/build-wasm
      - name: test
        run: |
          ./scripts/test
