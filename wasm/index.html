<!doctype html>
<html>
<head>
<meta http-equiv="Content-type" content="text/html; charset=utf-8" />
<meta name="viewport" content="initial-scale=1">
<title>Try ari in the Browser</title>
<link rel="stylesheet" type="text/css" href="style.css" />
</head>
<body>
<script src="wasm_exec.js"></script>
<div class="menu">
	<a class="home" title="back to main page" href="/">Back</a>
	<button id="eval" title="run Goal code (shortcut: ctrl-enter)">eval</button>
	<button id="reset" title="reset interpreter state">reset</button>
	<button id="link" title="copy link to clipboard">link</button>
	<button id="help" title="display help (shortcut: F1)">help</button>
	<span id="ariVersion"></span>
	<span class="loading" id="loading">Loading...</span>
</div>
<div class="fl fr">
	<textarea id="in" class="fl" autofocus="" spellcheck="false"></textarea>
	<textarea id="out" class="fl" readonly="" placeholder="output (ctrl-enter to eval)" spellcheck="false"></textarea>
</div>
<script>
// ariOnReady is called by the WASM binary once window.ari is registered.
// All DOM wiring lives here so the Go code stays independent of element IDs.
function ariOnReady() {
	var inEl  = document.getElementById("in");
	var outEl = document.getElementById("out");

	document.getElementById("ariVersion").textContent = ari.version();
	document.getElementById("loading").textContent = "";

	// Restore state from URL hash on load.
	var initialCode = ari.decodeState(window.location.hash);
	if (initialCode) {
		inEl.value = initialCode;
	}

	function runEval() {
		outEl.value = ari.eval(inEl.value);
		window.location.hash = ari.encodeState(inEl.value);
	}

	function showHelp() {
		outEl.value = ari.help(inEl.value.slice(inEl.selectionStart, inEl.selectionEnd));
	}

	document.getElementById("eval").addEventListener("click", runEval);

	inEl.addEventListener("keydown", function(e) {
		if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
			e.preventDefault();
			runEval();
		} else if (e.key === "F1") {
			showHelp();
		}
	});

	document.getElementById("link").addEventListener("click", function() {
		window.location.hash = ari.encodeState(inEl.value);
		navigator.clipboard.writeText(window.location.href);
	});

	document.getElementById("help").addEventListener("click", showHelp);

	document.getElementById("reset").addEventListener("click", function() {
		ari.reset();
		outEl.value = "";
	});

	window.addEventListener("hashchange", function() {
		inEl.value = ari.decodeState(window.location.hash);
	});
}
</script>
<script>
if (!WebAssembly.instantiateStreaming) { // polyfill
	WebAssembly.instantiateStreaming = async (resp, importObject) => {
		const source = await (await resp).arrayBuffer();
		return await WebAssembly.instantiate(source, importObject);
	};
}
const go = new Go();
let mod, inst;
WebAssembly.instantiateStreaming(fetch("ari.wasm"), go.importObject).then((result) => {
	mod = result.module;
	inst = result.instance;
	go.run(inst);
}).catch((err) => {
	console.error(err);
});
</script>
</body>
</html>
