name: build

on:
  push:
    branches:
      - "main"
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-go@4a2405e6aebff6aabd8e43618539aa35cf90ac92
        with:
          go-version: "1.25"
      - name: Cache apt packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: /var/cache/apt/archives
          key: apt-fyne-deps-v1
      - name: Install system dependencies (Fyne/OpenGL)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libgl1-mesa-dev xorg-dev
      - name: build-wasm
        run: |
          ./scripts/build-wasm
      - name: build-native
        run: |
          ./scripts/build
      - name: test
        run: |
          ./scripts/test
