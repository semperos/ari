name: golangci-lint
on:
  push:
    branches:
      - "main"
  pull_request:

permissions:
  contents: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-go@78961f6f84d799cd858575bb931c3e51d3b13290
        with:
          go-version: "1.25"
      - name: Cache apt packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: /var/cache/apt/archives
          key: apt-fyne-deps-v1
      - name: Install system dependencies (Fyne/OpenGL)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libgl1-mesa-dev xorg-dev
      - name: golangci-lint
        uses: golangci/golangci-lint-action@e52a9f899623adbdb986c05b9a8f7a8cf4138fc3
        with:
          version: v2.12.2
